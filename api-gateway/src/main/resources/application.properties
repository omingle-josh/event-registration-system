server.port=8080
spring.application.name=api-gateway

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

jwt.secret=${JWT_SECRET:supersecretkey1234567890supersecretkey1234567890}

# Routes mapped per specifications

# 1. Public route (no auth)
spring.cloud.gateway.routes[0].id=auth-service-public
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# 2. Secured auth-service routes
spring.cloud.gateway.routes[1].id=auth-service-secured
spring.cloud.gateway.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/**,/user/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# 3. Event Service Route (Secured)
spring.cloud.gateway.routes[2].id=event-service
spring.cloud.gateway.routes[2].uri=lb://EVENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/events/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# 4. Registration Service Route (Secured)
spring.cloud.gateway.routes[3].id=registration-service
spring.cloud.gateway.routes[3].uri=lb://REGISTRATION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/register/**,/registration/**,/registrations/**,/receipts/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# 5. Public Registration Service Route
spring.cloud.gateway.routes[4].id=registration-service-public
spring.cloud.gateway.routes[4].uri=lb://REGISTRATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/webhooks/**
